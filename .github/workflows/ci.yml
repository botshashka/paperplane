name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build

  smoke:
    name: Real-Paper smoke test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Boot Paper and verify host loads inner plugin
        run: .github/scripts/smoke-test.sh
        timeout-minutes: 10

  smoke-latest:
    name: Real-Paper smoke test (latest Paper canary)
    runs-on: ubuntu-latest
    needs: build
    # Drift canary: runs against whatever Paper the CLI resolves as latest. A failure here
    # means a new Paper build broke the ReflectionProbe/CPCL integration — it must not block
    # the pipeline, only warn.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Boot latest Paper and verify host loads inner plugin
        run: .github/scripts/smoke-test.sh
        env:
          SMOKE_PAPER_VERSION: latest
        timeout-minutes: 10
