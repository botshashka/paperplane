name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Single source for the Paper build the pinned real-server jobs gate on, so the smoke test and
# the world-primitive E2E can never drift apart. This is the newest release in the newest
# api-version line the CLI supports (Versions.SUPPORTED_API_VERSIONS) — deliberately NOT the
# newest Paper, which is a 26.x build the CLI cannot yet resolve.
env:
  PINNED_PAPER_VERSION: "1.21.11"

jobs:
  build:
    name: Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build

  smoke:
    name: Real-Paper smoke test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Boot Paper and verify host loads inner plugin
        run: .github/scripts/smoke-test.sh
        env:
          SMOKE_PAPER_VERSION: ${{ env.PINNED_PAPER_VERSION }}
        timeout-minutes: 10

  world-e2e:
    name: Real-Paper world primitives
    runs-on: ubuntu-latest
    needs: build
    # Drives WorldSync / WorldRefreshFlow against a real Paper server — the only test that touches
    # the live world-load path. Every finding this test exists for (uid.dat UUID collisions, async
    # chunk I/O outliving unloadWorld, cp -c degradation) was invisible to MockBukkit.
    #
    # Non-blocking for now: its timings (warmup-deletion poll, save and readiness timeouts) were
    # tuned on a developer machine, and a loaded shared runner is a different machine. Promote to
    # a hard gate once it has proven stable over a handful of runs — a red check nobody trusts is
    # worse than no check.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Drive the world primitives against a real Paper server
        run: ./gradlew :cli:test --tests "dev.paperplane.cli.e2e.WorldRefreshE2ETest"
        env:
          PPL_E2E: "1"
          PPL_E2E_PAPER_VERSION: ${{ env.PINNED_PAPER_VERSION }}
        timeout-minutes: 10

  smoke-latest:
    name: Real-Paper smoke test (latest Paper canary)
    runs-on: ubuntu-latest
    needs: build
    # Drift canary: runs against whatever Paper the CLI resolves as latest. A failure here
    # means a new Paper build broke the ReflectionProbe/CPCL integration — it must not block
    # the pipeline, only warn.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Boot latest Paper and verify host loads inner plugin
        run: .github/scripts/smoke-test.sh
        env:
          SMOKE_PAPER_VERSION: latest
        timeout-minutes: 10
